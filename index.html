<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>成為富婆GOGOGO</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --sakura-pink: #FFB7C5;
            --sakura-deep: #FF85A1;
            --sakura-light: #FFF0F3;
            --income-blue: #88B0D8;
            --gold: #D4AF37;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #FFF9FA; margin: 0; display: flex; justify-content: center; color: #5D5D5D; padding-top: env(safe-area-inset-top); }
        .phone-container { width: 100%; max-width: 400px; background: #FFF9FA; min-height: 100vh; position: relative; padding-bottom: 120px; }
        .page { display: none; padding: 0 0 20px 0; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        header { padding: 30px 25px 10px; text-align: center; }
        .title { color: var(--sakura-deep); font-size: 26px; font-weight: 900; margin: 0; letter-spacing: 1px; }
        .subtitle { font-size: 10px; color: var(--sakura-pink); letter-spacing: 3px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }

        .balance-card { background: linear-gradient(135deg, #FF85A1 0%, #FFB7C5 100%); margin: 0 20px 20px; padding: 25px; border-radius: 30px; color: white; box-shadow: 0 10px 20px rgba(255, 133, 161, 0.3); }
        .balance-amount { font-size: 36px; font-weight: 900; margin: 5px 0; }
        .balance-label { font-size: 12px; font-weight: bold; opacity: 0.9; }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 20px 20px; }
        .summary-item { background: white; padding: 15px; border-radius: 20px; border: 1px solid var(--sakura-light); text-align: center; }
        .summary-item.full { grid-column: span 2; background: var(--sakura-light); border: 1px solid var(--sakura-pink); }
        .summary-val { font-size: 18px; font-weight: 900; margin-top: 5px; }
        .val-income { color: var(--income-blue); }
        .val-expense { color: var(--sakura-deep); }

        .settings-section { background: white; margin: 0 20px 20px; padding: 15px; border-radius: 20px; border: 1px solid var(--sakura-light); }
        .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #FFF9FA; }
        .settings-label { font-size: 12px; font-weight: bold; color: #888; }
        .settings-input { width: 100px; border: none; border-bottom: 2px solid var(--sakura-light); text-align: right; font-size: 14px; font-weight: bold; color: var(--sakura-deep); outline: none; background: transparent; }

        .section-title { font-size: 11px; font-weight: 900; color: var(--sakura-pink); margin: 20px 20px 12px; display: flex; align-items: center; gap: 5px; }
        .goal-card { background: white; padding: 15px; border-radius: 20px; margin: 0 20px 12px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border: 1px solid #FFF0F3; }
        .goal-info { flex: 1; }
        .goal-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .goal-name { font-size: 13px; font-weight: bold; }
        .goal-percent { font-size: 12px; color: var(--sakura-deep); font-weight: 900; }
        .progress-bg { height: 8px; background: #F0F0F0; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--sakura-pink), var(--sakura-deep)); transition: width 0.6s ease; }

        .nav-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 280px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 8px; border-radius: 40px; display: flex; box-shadow: 0 15px 35px rgba(255, 133, 161, 0.2); z-index: 1000; border: 1px solid white; }
        .nav-item { flex: 1; padding: 12px; text-align: center; border-radius: 30px; font-size: 12px; font-weight: 900; cursor: pointer; color: var(--sakura-pink); }
        .nav-item.active { background: var(--sakura-deep); color: white; }

        .input-card { background: white; margin: 0 20px; padding: 20px; border-radius: 25px; border: 1.5px solid var(--sakura-light); }
        .type-toggle { display: flex; background: var(--sakura-light); border-radius: 15px; padding: 4px; margin-bottom: 20px; }
        .type-btn { flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 900; border-radius: 12px; cursor: pointer; color: var(--sakura-deep); }
        .type-btn.active.expense { background: var(--sakura-deep); color: white; }
        .type-btn.active.income { background: var(--income-blue); color: white; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 900; color: var(--sakura-pink); margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px 15px; border-radius: 15px; border: 1.5px solid var(--sakura-light); outline: none; font-size: 16px; color: #5D5D5D; }
        .btn-submit { width: 100%; padding: 15px; background: var(--sakura-deep); color: white; border: none; border-radius: 18px; font-weight: 900; cursor: pointer; }
        .btn-submit.income-mode { background: var(--income-blue); }
        
        .reset-btn { text-align: center; margin-top: 20px; font-size: 10px; color: #CCC; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="phone-container">
    <header>
        <p class="subtitle">Future Rich Woman Planner</p>
        <h1 class="title">成為富婆GOGOGO 💰</h1>
    </header>

    <div id="page-dream" class="page active">
        <div class="balance-card">
            <div class="balance-label">當前富婆儲備金 🎀</div>
            <div class="balance-amount" id="display-balance">$0</div>
        </div>

        <div class="section-title"><span>⚙️</span> 目標設定 SETTINGS</div>
        <div class="settings-section">
            <div class="setting-row">
                <div class="settings-label"><span>💰</span> 初始基金</div>
                <input type="number" id="init-fund-input" class="settings-input" value="20500" onchange="saveData()">
            </div>
            <div class="setting-row">
                <div class="settings-label"><span>💳</span> 信用卡目標</div>
                <input type="number" id="target-goal1" class="settings-input" value="5900" onchange="saveData()">
            </div>
            <div class="setting-row">
                <div class="settings-label"><span>📱</span> S26 Ultra 目標</div>
                <input type="number" id="target-goal2" class="settings-input" value="10000" onchange="saveData()">
            </div>
            <div class="setting-row">
                <div class="settings-label"><span>🇹🇭</span> 泰國之旅目標</div>
                <input type="number" id="target-goal3" class="settings-input" value="7000" onchange="saveData()">
            </div>
        </div>

        <div class="section-title"><span>📈</span> 夢想進度 PROGRESS</div>
        <div id="goals-container"></div>
        <div class="reset-btn" onclick="clearAllData()">重置所有數據 (慎用)</div>
    </div>

    <div id="page-ledger" class="page">
        <div class="section-title"><span>📊</span> 財務概覽 SUMMARY</div>
        <div class="summary-grid">
            <div class="summary-item"><div class="summary-lab">總收入 💰</div><div class="summary-val val-income" id="total-income-display">$0</div></div>
            <div class="summary-item"><div class="summary-lab">總支出 💸</div><div class="summary-val val-expense" id="total-expense-display">$0</div></div>
            <div class="summary-item full"><div class="summary-lab">當前結餘 🎀</div><div class="summary-val" id="ledger-balance-display">$0</div></div>
        </div>

        <div class="section-title"><span>✍️</span> 記帳 RECORD</div>
        <div class="input-card">
            <div class="type-toggle">
                <div id="tab-expense" class="type-btn active expense" onclick="setType('expense')">支出 💸</div>
                <div id="tab-income" class="type-btn income" onclick="setType('income')">收入 💰</div>
            </div>
            <div class="input-group"><label>金額 AMOUNT</label><input type="number" id="input-amount" inputmode="decimal" placeholder="0.00"></div>
            <div class="input-group">
                <label>類別 CATEGORY</label>
                <select id="input-category">
                    <option>飲食 🍕</option><option>交通 🚌</option><option>薪金/獎金 💵</option><option>生活開支 🛍️</option><option>清還卡數 💳</option><option>美甲/美容 💅</option><option>其他 🌸</option>
                </select>
            </div>
            <button class="btn-submit" id="btn-submit" onclick="addRecord()">記下這筆支出 🌸</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchPage('dream', this)">🏠 夢想</div>
        <div class="nav-item" onclick="switchPage('ledger', this)">📖 帳本</div>
    </div>
</div>

<script>
    let state = {
        initFund: 20500,
        targets: { goal1: 5900, goal2: 10000, goal3: 7000 },
        totalIncome: 0,
        totalExpense: 0,
        currentType: 'expense'
    };

    window.onload = function() {
        const saved = localStorage.getItem('richWomanData');
        if (saved) {
            try {
                state = JSON.parse(saved);
                document.getElementById('init-fund-input').value = state.initFund;
                document.getElementById('target-goal1').value = state.targets.goal1;
                document.getElementById('target-goal2').value = state.targets.goal2;
                document.getElementById('target-goal3').value = state.targets.goal3;
            } catch(e) { console.error("Data load error", e); }
        }
        updateUI();
    };

    function saveData() {
        state.initFund = parseFloat(document.getElementById('init-fund-input').value) || 0;
        state.targets.goal1 = parseFloat(document.getElementById('target-goal1').value) || 1;
        state.targets.goal2 = parseFloat(document.getElementById('target-goal2').value) || 1;
        state.targets.goal3 = parseFloat(document.getElementById('target-goal3').value) || 1;
        localStorage.setItem('richWomanData', JSON.stringify(state));
        updateUI();
    }

    function updateUI() {
        const currentBalance = state.initFund + state.totalIncome - state.totalExpense;
        document.getElementById('display-balance').innerText = '$' + currentBalance.toLocaleString();
        document.getElementById('ledger-balance-display').innerText = '$' + currentBalance.toLocaleString();
        document.getElementById('total-income-display').innerText = '$' + state.totalIncome.toLocaleString();
        document.getElementById('total-expense-display').innerText = '$' + state.totalExpense.toLocaleString();

        const container = document.getElementById('goals-container');
        container.innerHTML = ''; // 清空重新渲染
        renderGoal('goal1', '清還卡數 💳', currentBalance, state.targets.goal1);
        renderGoal('goal2', 'S26 Ultra 📱', currentBalance, state.targets.goal2);
        renderGoal('goal3', '泰國之旅 🇹🇭', currentBalance, state.targets.goal3);
    }

    function renderGoal(id, name, current, target) {
        let percent = Math.min(Math.floor((current / target) * 100), 100);
        if (percent < 0) percent = 0;
        
        const container = document.getElementById('goals-container');
        container.innerHTML += `
            <div class="goal-card" id="card-${id}">
                <div class="goal-info">
                    <div class="goal-header">
                        <span class="goal-name">${name} <small style="color:#ccc">($${target})</small></span>
                        <span class="goal-percent">${percent}%</span>
                    </div>
                    <div class="progress-bg"><div class="progress-fill" style="width: ${percent}%"></div></div>
                </div>
            </div>`;
    }

    function setType(type) {
        state.currentType = type;
        const btn = document.getElementById('btn-submit');
        document.getElementById('tab-expense').classList.toggle('active', type === 'expense');
        document.getElementById('tab-income').classList.toggle('active', type === 'income');
        btn.className = type === 'expense' ? 'btn-submit' : 'btn-submit income-mode';
        btn.innerText = type === 'expense' ? '記下這筆支出 🌸' : '存入這筆收入 💰';
    }

    function addRecord() {
        const amt = parseFloat(document.getElementById('input-amount').value);
        if (!amt) return;
        
        if (state.currentType === 'expense') state.totalExpense += amt;
        else state.totalIncome += amt;
        
        document.getElementById('input-amount').value = '';
        saveData();
    }

    function switchPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function clearAllData() {
        if(confirm('確定要清除所有紀錄嗎？')) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
